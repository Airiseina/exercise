services:
  etcd:
    image: quay.io/coreos/etcd:v3.6.8
    container_name: etcd-1
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://127.0.0.1:2379
    ports:
      - "2379:2379"
    restart: always
    networks:
      - demo

networks:
  demo:
    driver: bridge